name: Developer Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_dev_release:
    if: github.ref_name == 'dev'
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - os: win
            arch: x64
          - os: win
            arch: arm64
          - os: linux
            arch: x64
          - os: linux
            arch: arm64
          - os: osx
            arch: x64
          - os: osx
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        shell: pwsh
        run: |
          ./publish.ps1 -profiles framework-dependent-${{ matrix.os }}-${{ matrix.arch }}

      - name: Zip build
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "build/Release/framework-dependent-${{ matrix.os }}-${{ matrix.arch }}/*" `
            -DestinationPath "Solace-Dev-${{ matrix.os }}-${{ matrix.arch }}.zip"

      - name: Update Dev Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-build
          name: "Solace Development Build"
          prerelease: true
          files: Solace-Dev-${{ matrix.os }}-${{ matrix.arch }}.zip
          generate_release_notes: true
          body: |
            ⚠️ **Warning:** This is a manually triggered developer snapshot. It may contain unfinished features or bugs.
            
            **Source Branch:** ${{ github.ref_name }}
            **Commit SHA:** ${{ github.sha }}
            
            ---
            ![Solace Banner](https://raw.githubusercontent.com/Earth-Restored/Solace/main/images/solace_banner.png)

name: Release Build

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  prepare_version:
    runs-on: windows-latest
    outputs:
      next_tag: ${{ steps.versioning.outputs.next_tag }}
      previous_tag: ${{ steps.versioning.outputs.previous_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Calculate Next Version
        id: versioning
        shell: pwsh
        run: |
          git fetch --tags
          $latestTag = git tag --list "v*" | Sort-Object {[version]($_ -replace 'v','')} -Descending | Select-Object -First 1
          if (-not $latestTag) {
              $nextTag = "v0.0.1"
              $previousTag = ""
          } else {
              $previousTag = $latestTag
              $versionStr = $latestTag -replace 'v', ''
              $version = [version]$versionStr
              if ($version.Build -eq 9) {
                  if ($version.Minor -eq 9) {
                      $nextVersion = "{0}.0.0" -f ($version.Major + 1)
                  } else {
                      $nextVersion = "{0}.{1}.0" -f $version.Major, ($version.Minor + 1)
                  }
              } else {
                  $nextVersion = "{0}.{1}.{2}" -f $version.Major, $version.Minor, ($version.Build + 1)
              }
              $nextTag = "v$nextVersion"
          }
          echo "next_tag=$nextTag" >> $env:GITHUB_OUTPUT
          echo "previous_tag=$previousTag" >> $env:GITHUB_OUTPUT

      - name: Create and Push Git Tag
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.versioning.outputs.next_tag }}
          git push origin ${{ steps.versioning.outputs.next_tag }}

  build:
    needs: prepare_version
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - os: win
            arch: x64
          - os: win
            arch: arm64
          - os: linux
            arch: x64
          - os: linux
            arch: arm64
          - os: osx
            arch: x64
          - os: osx
            arch: arm64

    steps:
      - name: Checkout repository at new tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_version.outputs.next_tag }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        shell: pwsh
        run: |
          ./publish.ps1 -profiles framework-dependent-${{ matrix.os }}-${{ matrix.arch }}

      - name: Zip build
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "build/Release/framework-dependent-${{ matrix.os }}-${{ matrix.arch }}/*" `
            -DestinationPath "Apace-${{ matrix.os }}-${{ matrix.arch }}.zip"

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "Apace-${{ matrix.os }}-${{ matrix.arch }}.zip" staging/

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: build-${{ matrix.os }}-${{ matrix.arch }}
          path: staging/*

  release:
    needs: [prepare_version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Attest artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'artifacts/*'

      - name: Generate Notes and Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.prepare_version.outputs.next_tag }}
          PREV_VERSION=${{ needs.prepare_version.outputs.previous_tag }}
          REPO="${{ github.repository }}"
          if [ -z "$PREV_VERSION" ]; then
            NOTES_JSON=$(gh api repos/$REPO/releases/generate-notes -f tag_name="$VERSION")
          else
            NOTES_JSON=$(gh api repos/$REPO/releases/generate-notes -f tag_name="$VERSION" -f target_commitish="main" -f previous_tag_name="$PREV_VERSION")
          fi
          GENERATED_NOTES=$(echo "$NOTES_JSON" | jq -r '.body')
          RELEASE_BODY="## Apace ($VERSION)

          $GENERATED_NOTES

          ---
          ![Apace Banner](https://raw.githubusercontent.com/KotPasztet/Apace/main/images/Apace_Branding.png)"
          gh release create "$VERSION" artifacts/* \
            --title "$VERSION" \
            --notes "$RELEASE_BODY"

  cleanup:
    needs: release
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            build-win-x64
            build-win-arm64
            build-linux-x64
            build-linux-arm64
            build-osx-x64
            build-osx-arm64
